<body class="bg-[#FAF9F8] font-body-lg text-on-surface h-screen w-screen overflow-hidden antialiased">
<main class="flex h-full w-full overflow-hidden">
<!-- Left Side: Hero Area (55%) -->
<section class="hidden lg:flex w-[55%] relative flex-col bg-[#FAF9F8]">
<!-- Brand Anchor -->
<div class="absolute top-0 left-0 p-margin-desktop z-20">
<span class="font-headline-lg text-headline-lg text-on-surface flex items-center gap-3">
<span class="material-symbols-outlined text-[#F27121] text-[36px]" style="font-variation-settings: 'FILL' 1;">domain</span>
                    ParkFlow Management
                </span>
</div>
<!-- Hero Image -->
<div class="absolute inset-0 w-full h-full overflow-hidden">
<img alt="Modern parking facility entrance" class="object-cover w-full h-full object-center" data-alt="A high-quality, professional photograph of a modern, multi-level parking building entrance gate." src="https://cdn.phototourl.com/free/2026-06-11-ea54cb39-78d9-493b-a28f-404e2bd17850.png"/>
<!-- Warm Beige/Orange Overlay -->
<div class="absolute inset-0 bg-gradient-to-tr from-[#FAF9F8]/60 via-transparent to-[#F27121]/20 mix-blend-multiply"></div>
<div class="absolute inset-0 bg-[#F27121]/10"></div>
</div>
</section>
<!-- Right Side: Login Form (45%) -->
<section class="flex flex-col justify-center items-center w-full lg:w-[45%] h-full relative bg-[#FAF9F8] px-margin-mobile lg:px-margin-desktop">
<!-- Main Content Container -->
<div class="w-full max-w-[420px] flex flex-col z-10">
<p class="font-label-md text-label-md text-secondary text-center mb-stack-sm tracking-widest uppercase">Secure Access Portal</p>
<!-- Login Card (Level 1 Depth) -->
<div class="bg-surface-white rounded-2xl p-stack-lg shadow-[0_4px_20px_rgba(93,64,55,0.08)] flex flex-col w-full border border-surface-container-low">
<div class="text-center mb-stack-lg">
<h1 class="font-display-lg text-display-lg text-on-surface mb-unit">Welcome Back</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Please enter your details to sign in.</p>
</div>
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-unit">
<label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
<input class="w-full bg-[#FAF9F8] border border-outline-variant rounded-lg px-4 py-3 font-body-lg text-body-lg text-on-surface focus:border-[#F27121] focus:ring-1 focus:ring-[#F27121] outline-none transition-all duration-200 placeholder:text-tertiary-container" id="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-unit">
<div class="flex justify-between items-end">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-[#F27121] hover:text-[#d8621a] transition-colors" href="#">Forgot password?</a>
</div>
<input class="w-full bg-[#FAF9F8] border border-outline-variant rounded-lg px-4 py-3 font-body-lg text-body-lg text-on-surface focus:border-[#F27121] focus:ring-1 focus:ring-[#F27121] outline-none transition-all duration-200 placeholder:text-tertiary-container" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Submit Button -->
<button class="w-full bg-[#F27121] text-white rounded-lg font-title-md text-title-md py-3 mt-stack-sm hover:bg-[#d8621a] transition-colors shadow-[0_4px_14px_rgba(242,113,33,0.15)] active:scale-[0.98] duration-200 flex justify-center items-center" type="submit">
                            Sign In
                        </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-stack-md opacity-70">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="font-label-md text-label-md text-secondary">Hoặc đăng nhập bằng</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<!-- Google SSO -->
<button class="w-full bg-surface-white border border-outline-variant rounded-lg font-title-md text-title-md py-3 text-on-surface hover:bg-surface-container-low transition-colors flex justify-center items-center gap-3 active:scale-[0.98] duration-200" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Google
                    </button>
</div>
</div>
<!-- Global Footer applied contextually to the bottom of the right pane -->
<footer class="absolute bottom-4 w-full bg-transparent flex justify-center items-center gap-gutter px-margin-desktop z-0 text-secondary font-label-md text-label-md transition-all duration-200">
<div class="flex flex-col items-center gap-unit">
<span>© 2024 ParkFlow Systems. All rights reserved.</span>
<div class="flex gap-gutter">
<a class="text-secondary opacity-70 hover:opacity-100 hover:text-[#F27121] transition-opacity" href="#">Privacy Policy</a>
<a class="text-secondary opacity-70 hover:opacity-100 hover:text-[#F27121] transition-opacity" href="#">Terms of Service</a>
<a class="text-secondary opacity-70 hover:opacity-100 hover:text-[#F27121] transition-opacity" href="#">Support</a>
</div>
</div>
</footer>
</section>
</main>
